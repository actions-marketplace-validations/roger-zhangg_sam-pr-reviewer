name: 'SAM PR Reviewer'
description: 'AI-powered PR code reviewer using Kiro CLI. Posts inline comments with categorized findings.'
author: 'roger-zhangg'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  github_token:
    description: 'GitHub token for posting PR reviews.'
    required: true
  kiro_api_key:
    description: 'Kiro CLI API key for headless mode. Store as a repository secret.'
    required: true
  timeout_minutes:
    description: 'Maximum time in minutes for the review. Partial results are posted if exceeded.'
    required: false
    default: '10'
  guidelines_path:
    description: 'Path to a custom coding guidelines file (relative to repo root). Merged with built-in guidelines.'
    required: false
    default: ''
  dismiss_previous:
    description: 'Delete previous SAM PR Reviewer comments before posting new review.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run SAM PR Review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        KIRO_API_KEY: ${{ inputs.kiro_api_key }}
        INPUT_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
        INPUT_GUIDELINES_PATH: ${{ inputs.guidelines_path }}
        INPUT_DISMISS_PREVIOUS: ${{ inputs.dismiss_previous }}
      run: ${{ github.action_path }}/entrypoint.sh
